# PPO training configuration for goal-conditioned cell reprogramming

env:
  dt: 0.1  # Time step (configurable, logged during training)
  T_max: 100  # Maximum episode length
  eps_success: 0.1  # Success threshold distance
  lambda_act: 0.01  # L0 penalty (action usage)
  lambda_mag: 0.1  # L1 penalty (magnitude)
  R_succ: 10.0  # Success bonus
  velocity_mode: decode_x  # Options: latent_only, fixed_x, decode_x

ppo:
  gamma: 0.99  # Discount factor
  gae_lambda: 0.95  # GAE lambda
  clip_eps: 0.2  # PPO clipping epsilon
  target_kl: 0.01  # KL early stopping threshold
  vf_coef: 0.5  # Value function coefficient
  ent_coef: 0.01  # Entropy coefficient
  lr: 3e-4  # Learning rate
  max_grad_norm: 0.5  # Gradient clipping

policy:
  hidden_sizes: [128, 128]  # MLP hidden layer sizes
  delta_max: 1.0  # Maximum perturbation magnitude

training:
  batch_size: 64  # Environment batch size
  T_rollout: 50  # Rollout horizon
  epochs: 10  # PPO inner epochs
  minibatch_size: 64  # Minibatch size for updates
  n_iterations: 1000  # Total training iterations
  save_freq: 100  # Checkpoint save frequency
